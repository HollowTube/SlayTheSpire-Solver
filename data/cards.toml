# Card catalogue — single source of truth for ids.rs, names.py, and cards.rs.
#
# Each entry:
#   variant      — Rust enum variant name (also used to derive Python enum member)
#   display      — canonical sim display string (what as_str() returns)
#   sts2_id      — STS2 ModelId screaming-snake (what sts2_id() returns)
#   in_card_pool — if false, excluded from ALL_CARD_NAMES in cards.rs (default true)
#
# Adding a new card: add one [[cards]] entry here, then run scripts/gen_ids.py,
# then implement card_data() in src/cards.rs and the card logic in src/cards.rs.

