# Monster catalogue — single source of truth for ids.rs and names.py.
#
# Each entry:
#   variant        — Rust enum variant name
#   display        — canonical sim display string (what as_str() returns)
#   sts2_id        — STS2 ModelId screaming-snake (what sts2_id() returns)
#   bridge_classes — C# bridge class names that map to this monster in _MONSTER_MAP
#   bridge_note    — optional comment emitted above bridge_classes entries in names.py
#
# Adding a new monster: add one [[monsters]] entry here, then run scripts/gen_ids.py,
# then implement the monster's AI in src/monsters.rs.

