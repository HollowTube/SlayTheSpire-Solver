# statuses.toml — canonical status / power definitions.
#
# Fields per entry:
#   sim_name      — the string returned by Status::name() in engine.rs
#   bridge_classes — every class name the bridge may report for this status.
#                    Typically includes both the short name (matching sim_name)
#                    and the Godot class name ("XxxPower").
#
# Adding a new status: add one [[statuses]] entry here, then run
# scripts/gen_ids.py to regenerate STATUS_MAP in python/sts_sim/bridge.py.

[[statuses]]
sim_name = "Vulnerable"
bridge_classes = ["Vulnerable", "VulnerablePower"]

