# Single source of truth for monster registration.
# When adding a new monster, add an entry here first, then add the Rust enum
# variant + AI in ids.rs/monsters.rs. The CI test test_monster_registration.py
# validates all 5 catalogues are in sync with this file.
#
# Fields:
#   variant       — Rust enum variant name (MonsterId::Xxx)
#   display_name  — Canonical sim display name (matches MonsterId::as_str())
#   sts2_id       — STS2 model ID (SCREAMING_SNAKE_CASE)
#   bridge_names  — Bridge C# class name(s) for _MONSTER_MAP
#   hp            — Canonical starting HP (omit for summoned/spawned minions)
#   encounter     — bench Encounter key (omit if no standalone scenario)

