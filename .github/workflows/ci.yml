name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Create venv and install
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Check Rust (no warnings)
        run: cargo check

      - name: Lint with ruff
        run: |
          source .venv/bin/activate
          ruff check python/ tests/
          ruff format --check python/ tests/

      - name: Type-check with mypy
        run: |
          source .venv/bin/activate
          mypy python/ tests/ --ignore-missing-imports

      - name: Run tests
        run: |
          source .venv/bin/activate
          pytest tests/ -q

      - name: Restore bridge_mod (.NET project sanity check)
        # Full `dotnet build` requires the proprietary sts2.dll from a local
        # STS2 install (not available in CI), so this only validates the
        # csproj/NuGet config. Build bridge_mod locally to catch type errors.
        run: dotnet restore bridge_mod/sts_sim_bridge_mod.csproj
