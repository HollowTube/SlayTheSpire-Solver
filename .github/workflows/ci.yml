name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Create venv and install
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Check Rust (no warnings)
        run: cargo check

      - name: Lint with flake8
        run: |
          source .venv/bin/activate
          # Fail on syntax errors and undefined names — these are real bugs
          flake8 python/ tests/ --count --select=E9,F63,F7,F82 --show-source

      - name: Run tests
        run: |
          source .venv/bin/activate
          pytest tests/ -q
